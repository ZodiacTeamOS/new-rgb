name: Unzip Addon

on:
  push:
    paths:
      - "*.zip"

jobs:
  unzip:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract ZIPs
        run: |
          for z in *.zip; do
            [ -f "$z" ] || continue
            unzip -o "$z" -d extracted
          done

      - name: Copy files to root
        run: |
          cp -r extracted/* .
          rm -rf extracted

      - name: Commit extracted files
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -m "Auto extract addon" || exit 0
          git push
